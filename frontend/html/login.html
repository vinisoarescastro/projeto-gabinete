<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gabinete Digital</title>

    <!-- ESTILOS -->
    <link rel="stylesheet" href="/frontend/css/style-login.css">
    <link rel="stylesheet" href="/frontend/css/global.css">

    <!-- FONTES -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- JAVASCRIPT -->
    <!-- <script type="module" src="/frontend/javascript/pages/login.js"></script> -->

    <script>
        window.location.replace("erro-404.html");
    </script>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-container">
            
            <!-- Logo centralizada -->
            <div class="logo-container">
                <img 
                    src="/frontend/img/gabinete-digital/logo-gabinete-digital.png" 
                    alt="Gabinete Digital"
                    class="logo"
                >
            </div>

            <!-- Formulário -->
            <form id="loginForm" class="login-form">
                
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="seu@email.com" 
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Digite sua senha" 
                        required
                        autocomplete="current-password"
                    >
                </div>

                <button type="submit" class="login-btn">
                    Entrar
                </button>
                
            </form>

            <!-- Link de contato -->
            <p class="texto-contato">
                Não tem acesso? <a href="#">Contate o Gabinete.</a>
            </p>

        </div>
    </div>
</body>
</html>
