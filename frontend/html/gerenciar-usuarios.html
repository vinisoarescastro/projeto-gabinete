<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabinete Digital - Gerenciar Usuários</title>

    <!-- ESTILOS -->
    <link rel="stylesheet" href="/frontend/css/global.css">
    <link rel="stylesheet" href="/frontend/css/header.css">
    <link rel="stylesheet" href="/frontend/css/nav.css">
    <link rel="stylesheet" href="/frontend/css/gerenciar-usuarios.css">
    <link rel="stylesheet" href="/frontend/css/nav-active.css">

    <!-- FONTES -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- JAVASCRIPT -->
    <script type="module" src="/frontend/javascript/pages/gerenciar-usuarios.js"></script>
</head>
<body>
    <!-- ✅ Container para o Header -->
    <div id="header-container"></div>

    <!-- ✅ Container para o Menu -->
    <div id="nav-container"></div>

    <!-- CONTEÚDO PRINCIPAL -->
    <section class="container-usuarios">
        <div class="interface">
            
            <div class="page-header">
                <h1>👥 Gerenciar Usuários</h1>
                <button class="btn btn-novo-usuario" id="btnNovoUsuario">
                    ➕ Novo Usuário
                </button>
            </div>

            <!-- Tabela de Usuários -->
            <div class="tabela-container">
                <table class="tabela-usuarios">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Email</th>
                            <th>Nível de Permissão</th>
                            <th>Status</th>
                            <th>Último Acesso</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabelaUsuarios">
                        <tr>
                            <td colspan="6" class="carregando">Carregando usuários...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </section>

    <!-- MODAL CRIAR/EDITAR USUÁRIO -->
    <div id="modalUsuario" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="tituloModalUsuario">Novo Usuário</h2>
                <span class="close" onclick="window.fecharModalUsuario()">&times;</span>
            </div>
            
            <form id="formUsuario">
                <div class="modal-body">
                    <input type="hidden" id="usuarioId">
                    
                    <div class="form-group">
                        <label for="nomeCompleto">Nome Completo *</label>
                        <input type="text" id="nomeCompleto" required>
                    </div>

                    <div class="form-group">
                        <label for="emailUsuario">Email *</label>
                        <input type="email" id="emailUsuario" required>
                    </div>

                    <div class="form-group">
                        <label for="nivelPermissao">Nível de Permissão *</label>
                        <select id="nivelPermissao" required>
                            <option value="">Selecione...</option>
                            <option value="administrador">Administrador</option>
                            <option value="chefe_gabinete">Chefe de Gabinete</option>
                            <option value="supervisor">Supervisor</option>
                            <option value="assessor_interno">Assessor Interno</option>
                            <option value="assessor_externo">Assessor Externo</option>
                        </select>
                    </div>

                    <div class="form-group" id="grupoSenha">
                        <label for="senhaUsuario">Senha Inicial *</label>
                        <input type="password" id="senhaUsuario" value="Senha123!" readonly>
                        <small style="color: #6c757d;">O usuário deverá alterar esta senha no primeiro acesso</small>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-cancelar" onclick="window.fecharModalUsuario()">Cancelar</button>
                    <button type="submit" class="btn-salvar">Salvar</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
