<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabinete Digital - Carregando...</title>
    
    <!-- Preload da fonte para melhor performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- CSS do Splash Screen -->
    <link rel="stylesheet" href="/frontend/css/index.css">
</head>
<body>
    <!-- Container principal do splash screen -->
    <div class="splash-container">
        <!-- Logo do sistema -->
        <div class="logo-container">
            <img src="/frontend/img/gabinete-digital/logo-gabinete-digital.png" alt="Gabinete Digital">
        </div>
        
        <!-- Texto de carregamento -->
        <div class="loading-text">
            Carregando<span class="loading-dots"></span>
        </div>
        
        <!-- Barra de progresso -->
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
    </div>

    <!-- Informação de versão (opcional) -->
    <div class="version-text">
        v1.0.0
        <br>Desenvolvido por Vinicius Soares

    </div>

    <!-- JavaScript do Splash Screen -->
    <script src="/frontend/javascript/index.js"></script>
</body>
</html>
